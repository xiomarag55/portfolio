<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Dev Portfolio | Full Stack Developer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Full Stack Developer Portfolio — Angular, Node.js, React, Cloud">
  <link rel="icon" type="image/x-icon" href="cat.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">
</head>

<body class="bg-neuro-base">
  <app-root>
    <div id="app-splash" style="
      position: fixed; inset: 0;
      background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <div style="
          width: 48px; height: 48px;
          border: 2px solid transparent;
          border-top-color: #00d4ff;
          border-right-color: #8b5cf6;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;">
        </div>
        <span style="
          font-family: 'JetBrains Mono', monospace, sans-serif;
          font-size: 12px; letter-spacing: 3px;
          color: #4a6fa5;">
          LOADING...
        </span>
      </div>
    </div>
    <style>
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </app-root>
</body>

</html>
